name: Update README workflow badges

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - ".github/workflows/*.yml"
      - ".github/workflows/*.yaml"
      - "tools/update_workflow_badges.py"
      - "README.md"
  pull_request:
    branches: [ "main" ]
    paths:
      - ".github/workflows/*.yml"
      - ".github/workflows/*.yaml"
      - "tools/update_workflow_badges.py"
      - "README.md"

permissions:
  contents: write

jobs:
  update-badges:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Update badge block
        run: python3 tools/update_workflow_badges.py

      - name: Check generated badges
        if: github.event_name == 'pull_request'
        run: git diff --exit-code README.md

      - name: Commit generated badges
        if: github.event_name != 'pull_request'
        run: |
          if git diff --quiet README.md; then
            echo "README badges are already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update workflow badges"
          git push
